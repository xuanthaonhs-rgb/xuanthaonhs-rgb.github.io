
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nguyễn An Nhiên 💖</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Comic Sans MS','Segoe UI',sans-serif;
}

body{
    background:linear-gradient(180deg,#ffd6e8,#fff0f6,#ffe6f2);
    color:#7d5063;
}

/* CONTAINER */
.container{
    max-width:1000px;
    margin:auto;
    padding:20px;
}

/* HEADER */
.header{
    background:white;
    text-align:center;
    padding:30px;
    border-radius:30px;
    margin-top:20px;
    box-shadow:0 8px 25px rgba(255,182,193,0.35);
}

.avatar{
    width:170px;
    height:170px;
    border-radius:50%;
    object-fit:cover;
    border:6px solid #ffb6d5;
}

h1{
    color:#ff69a6;
    margin-top:15px;
    font-size:40px;
}

.subtitle{
    margin-top:10px;
    font-size:18px;
}

/* BUTTON */
.candy-btn{
    margin-top:15px;
    padding:12px 25px;
    border:none;
    border-radius:30px;
    background:#ff8fc0;
    color:white;
    font-size:16px;
    cursor:pointer;
}

.candy-btn:hover{
    background:#ff69a6;
}

/* SECTION */
.section{
    background:white;
    margin-top:25px;
    padding:25px;
    border-radius:25px;
    box-shadow:0 8px 20px rgba(255,182,193,0.25);
}

.section h2{
    color:#ff69a6;
    margin-bottom:15px;
}

/* CARD */
.card{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
    align-items:center;
    margin-top:15px;
}

.card img{
    width:260px;
    border-radius:20px;
}

.card p{
    flex:1;
    font-size:18px;
    line-height:1.7;
}

/* KẸO RƠI */
.candy{
    position:fixed;
    top:-40px;
    font-size:28px;
    animation:fall 4s linear forwards;
    pointer-events:none;
}

/* CỜ RƠI */
.flag{
    position:fixed;
    top:-40px;
    font-size:28px;
    animation:fallFlag 4s linear forwards;
    pointer-events:none;
}

@keyframes fall{
    to{
        transform:translateY(110vh) rotate(360deg);
        opacity:0;
    }
}

@keyframes fallFlag{
    to{
        transform:translateY(110vh) rotate(360deg);
        opacity:0;
    }
}

.footer{
    text-align:center;
    padding:25px;
    color:#ff69a6;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

    <!-- HEADER -->
    <div class="header">
        <img src="avata.jpg" class="avatar">
        <h1>Nguyễn An Nhiên</h1>
        <p class="subtitle">12 tuổi 💖 | Thế giới kẹo ngọt</p>

        <button class="candy-btn" onclick="raikeo()">🍬 Rải Kẹo</button>
    </div>

    <!-- VỀ TÔI -->
    <div class="section">
        <h2>💖 Về Tôi</h2>
        <p>Xin chào! Mình là Nguyễn An Nhiên, mình thích màu hồng pastel 🍓</p>
    </div>

    <!-- PIANO -->
    <div class="section">
        <h2>🎹 Piano</h2>
        <div class="card">
            <img src="piano.jpg">
            <p>Mình thích chơi piano vì rất nhẹ nhàng 🎶</p>
        </div>
    </div>

    <!-- VIỆT NAM -->
    <div class="section">
        <h2>🇻🇳 Việt Nam</h2>

        <div class="card">
            <img src="VietNam.jpg">
            <p>Mình yêu Việt Nam xinh đẹp 💖</p>
        </div>

        <button class="candy-btn" onclick="rancovietnam()">
            🇻🇳 Thả cờ Việt Nam
        </button>
    </div>

    <!-- IDOL -->
    <div class="section">
        <h2>⭐ Idol</h2>
        <div class="card">
            <img src="Rhyder.jpg">
            <p>Idol của mình là Rhyder 🎤</p>
        </div>
    </div>

    <div class="footer">
        🍬 Cảm ơn bạn đã ghé thăm 🍬
    </div>

</div>

<!-- JS -->
<script>

function raikeo(){
    const icons = ["🍬","🍭","🍫","🍓","🧁","🍰"];

    for(let i=0;i<50;i++){
        const candy = document.createElement("div");
        candy.className="candy";
        candy.innerHTML = icons[Math.floor(Math.random()*icons.length)];

        candy.style.left = Math.random()*100 + "vw";
        candy.style.animationDuration = (Math.random()*2 + 2) + "s";

        document.body.appendChild(candy);

        setTimeout(()=>candy.remove(),5000);
    }
}

function rancovietnam(){
    for(let i=0;i<60;i++){
        const flag = document.createElement("div");
        flag.className="flag";
        flag.innerHTML="🇻🇳";

        flag.style.left = Math.random()*100 + "vw";
        flag.style.animationDuration = (Math.random()*2 + 2) + "s";

        document.body.appendChild(flag);

        setTimeout(()=>flag.remove(),5000);
    }
}

</script>

</body>
</html>
